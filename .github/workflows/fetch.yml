name: Fetch new Hacks daily

on:
  schedule:
    - cron: '0 4 * * *' # Täglich um 04:00 UTC
  workflow_dispatch: # Erlaubt manuelles Triggern

permissions:
  contents: write

jobs:
  update-hacks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Fetcher Script
        run: node scripts/fetch-hacks.js

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add static/hacks.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-fetch: Update hacks.json" && git push)
